<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patty AI 条目 — 图标预览</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #6366f1;
    --accent-alpha: rgba(99, 102, 241, 0.12);
    --accent-glow: rgba(99, 102, 241, 0.3);
    --green: #34d399;
    --red: #f87171;
    --amber: #fbbf24;
    --bg-app: #08080a;
    --glass-bg: rgba(16, 16, 20, 0.55);
    --text-primary: #e6e6ed;
    --text-secondary: #90909e;
    --text-muted: #5c5c6a;
    --border-subtle: rgba(255,255,255,0.05);
    --font-ui: 'Inter', system-ui, sans-serif;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --transition-fast: 150ms var(--ease-out);
    --item-h: 42px;
  }

  body {
    height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 60px;
    background: var(--bg-app);
    font-family: var(--font-ui);
    font-size: 13px;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 40% at 12% 18%, rgba(99, 102, 241, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 88% 82%, rgba(34, 211, 238, 0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .preview-wrap {
    display: flex;
    gap: 40px;
    position: relative;
    z-index: 1;
  }

  .panel {
    width: 240px;
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 4px 24px rgba(0,0,0,0.5), 0 20px 48px rgba(0,0,0,0.3);
    background: var(--glass-bg);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .panel-search {
    flex: 1;
    height: 28px;
    padding: 0 8px;
    border-radius: var(--radius-sm);
    font-family: var(--font-ui);
    font-size: 12px;
    outline: none;
    background: rgba(128,128,128,0.06);
    border: 1px solid transparent;
    color: var(--text-primary);
  }
  .panel-search::placeholder { color: var(--text-muted); }

  .panel-list {
    padding: 4px;
    display: flex;
    flex-direction: column;
  }

  .panel-title {
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3px;
    padding: 8px 8px 4px;
    text-transform: uppercase;
  }

  .section-label {
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 12px 8px 2px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* ===== Session Item ===== */
  .session-item {
    display: flex;
    align-items: center;
    gap: 6px;
    height: var(--item-h);
    padding: 0 8px;
    cursor: pointer;
    border-radius: var(--radius-sm);
    position: relative;
    overflow: hidden;
    transition: all var(--transition-fast);
    will-change: transform, background;
  }
  .session-item:hover { background: rgba(128,128,128,0.06); transform: translateX(1px); }
  .session-item:active { transform: scale(0.98); }
  .session-item.active { background: var(--accent-alpha); }
  .session-item.active::before {
    content: '';
    position: absolute;
    left: -4px; top: 4px; bottom: 4px;
    width: 2.5px; border-radius: 0 3px 3px 0;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
  }

  .item-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.60;
    transition: opacity var(--transition-fast);
    display: grid;
    gap: 3.5px;
    align-content: center;
    justify-content: start;
    padding: 3px 6px;
  }
  .session-item:hover .item-grid { opacity: 0.90; }
  .item-grid .gc {
    border-radius: 2px;
    transition: background-color 240ms cubic-bezier(0.16,1,0.3,1), box-shadow 240ms cubic-bezier(0.16,1,0.3,1);
  }
  .item-grid[data-type="claude"] .gc.glow-3 { box-shadow: 0 0 4px rgba(204,120,92,0.25); }
  .item-grid[data-type="claude"] .gc.glow-4 { box-shadow: 0 0 8px rgba(204,120,92,0.5); }
  .item-grid[data-type="opencode"] .gc.glow-3 { box-shadow: 0 0 4px rgba(255,255,255,0.25); }
  .item-grid[data-type="opencode"] .gc.glow-4 { box-shadow: 0 0 8px rgba(255,255,255,0.5); }
  .item-grid::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 60%;
    pointer-events: none;
    opacity: 0;
    transition: opacity var(--transition-fast);
  }
  .session-item:hover .item-grid::after { opacity: 1; }
  .item-grid[data-type="claude"]::after {
    background: linear-gradient(90deg, transparent 0%, rgba(204,120,92,0.10) 40%, rgba(204,120,92,0.22) 100%);
  }
  .item-grid[data-type="opencode"]::after {
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 40%, rgba(255,255,255,0.18) 100%);
  }

  .session-item > .item-content { position: relative; z-index: 1; display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }

  .item-spacer { width: 4px; flex-shrink: 0; }

  /* ——— Dots ——— */
  .session-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    transition: box-shadow var(--transition-fast);
  }
  .session-dot.blue { background: #818cf8; }
  .session-dot.green { background: var(--green); }
  .session-dot.amber { background: var(--amber); }
  .session-dot.coral { background: #f87171; }
  .session-dot.purple { background: #a78bfa; }
  .session-dot.gray { background: #8899aa; }
  .session-item.active .session-dot { box-shadow: 0 0 5px var(--accent-glow); }

  /* ——— AI Icons (replace the dot) ——— */
  .ai-icon {
    width: 14px; height: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 3px;
    transition: box-shadow var(--transition-fast);
  }
  .ai-icon svg { display: block; }

  .ai-icon.claude {
    background: rgba(217,119,87,0.15);
    color: #d97757;
  }
  .ai-icon.opencode {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.85);
  }
  .session-item.active .ai-icon.claude { box-shadow: 0 0 6px rgba(204,120,92,0.3); }
  .session-item.active .ai-icon.opencode { box-shadow: 0 0 6px rgba(255,255,255,0.2); }

  .session-title {
    flex: 1; font-size: 12px; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: color var(--transition-fast);
  }
  .session-item:hover .session-title { color: var(--text-primary); }
  .session-item.active .session-title { color: var(--text-primary); font-weight: 500; }

  .session-close {
    display: flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 4px;
    opacity: 0; transition: all var(--transition-fast);
    cursor: pointer; color: var(--text-muted);
  }
  .session-item:hover .session-close { opacity: 1; }
  .session-close:hover { background: rgba(232, 17, 35, 0.15); color: var(--red) !important; }

  .tag {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 1px 5px;
    border-radius: 3px;
    margin-top: 8px;
  }
  .tag.current { background: var(--accent-alpha); color: var(--accent); }
  .tag.proposed { background: rgba(52, 211, 153, 0.1); color: var(--green); }
</style>
</head>
<body>

<div class="preview-wrap">

  <!-- ===== Column: Current (dot + AI badge) ===== -->
  <div class="panel">
    <div class="panel-header">
      <input class="panel-search" type="text" placeholder="Search sessions..." />
      <div class="sidebar-btn" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:var(--radius-sm);color:var(--text-muted);background:rgba(128,128,128,0.05);border:1px solid transparent;font-size:15px;cursor:pointer;transition:all var(--transition-fast);">+</div>
    </div>
    <div class="panel-list">

            <svg width="10" height="10" viewBox="0 0 20 20"><circle cx="10" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M10 5v10M5 10h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>

        <div class="item-content">

          <span class="ai-badge" style="display:flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:3px;flex-shrink:0;background:rgba(99,102,241,0.08);color:var(--accent);">
            <svg width="10" height="10" viewBox="0 0 20 20"><circle cx="10" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M10 5v10M5 10h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>

          <span class="session-title">opencode-agent</span>
          <div class="session-close"><svg width="8" height="8" viewBox="0 0 8 8"><path d="M0.5 0.5L7.5 7.5M7.5 0.5L0.5 7.5" stroke="currentColor" stroke-width="1.2"/></svg></div>
        </div>
      </div>

      <div class="session-item">
        <div class="item-content">
          <span class="item-spacer"></span>
          <span class="session-dot amber"></span>
          <span class="session-title">api-server</span>
          <div class="session-close"><svg width="8" height="8" viewBox="0 0 8 8"><path d="M0.5 0.5L7.5 7.5M7.5 0.5L0.5 7.5" stroke="currentColor" stroke-width="1.2"/></svg></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Column: Proposed (icon replaces dot) ===== -->
  <div class="panel">
    <div class="panel-header">
      <input class="panel-search" type="text" placeholder="Search sessions..." />
      <div class="sidebar-btn" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:var(--radius-sm);color:var(--text-muted);background:rgba(128,128,128,0.05);border:1px solid transparent;font-size:15px;cursor:pointer;transition:all var(--transition-fast);">+</div>
    </div>
    <div class="panel-list">
      <span class="panel-title" style="color:var(--green);">Proposed (icon replaces dot)</span>

      <!-- Claude: official swirl -->
      <div class="session-item active" data-ai="true" data-ai-type="claude">
        <div class="item-grid"></div>
        <div class="item-content">
          <span class="item-spacer"></span>
          <span class="ai-icon claude">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949zM6 10.949h1.488V8.102H6v2.847zm10.51 0H18V8.102h-1.49v2.847z"></path>
            </svg>
          </span>
          <span class="session-title">claude-code</span>
          <div class="session-close"><svg width="8" height="8" viewBox="0 0 8 8"><path d="M0.5 0.5L7.5 7.5M7.5 0.5L0.5 7.5" stroke="currentColor" stroke-width="1.2"/></svg></div>
        </div>
      </div>

      <!-- OpenCode: official O mark -->
      <div class="session-item" data-ai="true" data-ai-type="opencode">
        <div class="item-grid"></div>
        <div class="item-content">
          <span class="item-spacer"></span>
          <span class="ai-icon opencode">
            <svg width="12" height="12" viewBox="0 0 512 512" fill="currentColor">
              <path d="M384 416H128V96H384V416ZM320 160H192V352H320V160Z" fill-rule="evenodd" clip-rule="evenodd"/>
            </svg>
          </span>
          <span class="session-title">opencode-agent</span>
          <div class="session-close"><svg width="8" height="8" viewBox="0 0 8 8"><path d="M0.5 0.5L7.5 7.5M7.5 0.5L0.5 7.5" stroke="currentColor" stroke-width="1.2"/></svg></div>
        </div>
      </div>

      <!-- Non-AI: keeps dot -->
      <div class="session-item">
        <div class="item-content">
          <span class="item-spacer"></span>
          <span class="session-dot amber"></span>
          <span class="session-title">api-server</span>
          <div class="session-close"><svg width="8" height="8" viewBox="0 0 8 8"><path d="M0.5 0.5L7.5 7.5M7.5 0.5L0.5 7.5" stroke="currentColor" stroke-width="1.2"/></svg></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Column: Alternative icon styles ===== -->
  <div class="panel">
    <div class="panel-header">
      <input class="panel-search" type="text" placeholder="Search sessions..." />
      <div class="sidebar-btn" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:var(--radius-sm);color:var(--text-muted);background:rgba(128,128,128,0.05);border:1px solid transparent;font-size:15px;cursor:pointer;transition:all var(--transition-fast);">+</div>
    </div>
    <div class="panel-list">
      <span class="panel-title" style="color:var(--green);">Alternatives</span>
      <div class="section-label">Size comparison</div>

      <!-- Claude: full symbol (not cropped) -->

        <div class="item-grid"></div>
        <div class="item-content">
          <span class="item-spacer"></span>
          <span class="ai-icon claude">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.998 10.949H24v3.102h-3v3.028h-1.487V20H18v-2.921h-1.487V20H15v-2.921H9V20H7.488v-2.921H6V20H4.487v-2.921H3V14.05H0V10.95h3V5h17.998v5.949zM6 10.949h1.488V8.102H6v2.847zm10.51 0H18V8.102h-1.49v2.847z"></path>
            </svg>
          </span>

        </div>
      </div>

      <!-- OpenCode: full favicon -->
      <div class="session-item" data-ai="true" data-ai-type="opencode">
        <div class="item-grid"></div>
        <div class="item-content">
          <span class="item-spacer"></span>
          <span class="ai-icon opencode">
            <svg width="20" height="20" viewBox="0 0 512 512" fill="currentColor">
              <rect width="512" height="512" fill="none"/>
              <path d="M320 224V352H192V224H320Z" opacity="0.5"/>
              <path fill-rule="evenodd" clip-rule="evenodd" d="M384 416H128V96H384V416ZM320 160H192V352H320V160Z"/>
            </svg>
          </span>
          <span class="session-title">opencode (20×20)</span>
          <div class="session-close"><svg width="8" height="8" viewBox="0 0 8 8"><path d="M0.5 0.5L7.5 7.5M7.5 0.5L0.5 7.5" stroke="currentColor" stroke-width="1.2"/></svg></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const ROWS = 5
const GAP = 3.5
const PAD = 6

const PALETTES = {
  claude: [
    'transparent',
    'rgba(204,120,92,0.08)',
    'rgba(204,120,92,0.30)',
    'rgba(204,120,92,0.65)',
    'rgba(204,120,92,1.0)',
  ],
  opencode: [
    'transparent',
    'rgba(255,255,255,0.06)',
    'rgba(255,255,255,0.25)',
    'rgba(255,255,255,0.55)',
    'rgba(255,255,255,0.95)',
  ],
}

function setupFlameGrid(container, type) {
  const parent = container.parentElement
  const parentW = parent.offsetWidth || 240
  const parentH = parent.offsetHeight || 42
  const cellSize = Math.floor((parentH - PAD * 2 - (ROWS - 1) * GAP) / ROWS)
  const usableW = parentW - PAD * 2 - 20
  const COLS = Math.max(16, Math.floor((usableW + GAP) / (cellSize + GAP)))
  const palette = PALETTES[type] || PALETTES.opencode

  container.dataset.type = type
  container.style.gridTemplateColumns = `repeat(${COLS}, ${cellSize}px)`
  container.style.gridTemplateRows = `repeat(${ROWS}, ${cellSize}px)`

  const cells = []
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const div = document.createElement('div')
      div.className = 'gc'
      cells.push(div)
      container.appendChild(div)
    }
  }

  const heat = Array.from({ length: ROWS }, () => new Array(COLS).fill(0))
  let tick = 0

  function update() {
    tick++
    const swing = Math.sin(tick * 0.25) * 1.5

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = c / COLS
        if (p > 0.92) {
          heat[r][c] = Math.random() < 0.15 ? 3 : 4
          continue
        }

        const rightCol = c + 1
        let rightHeat = rightCol < COLS ? heat[r][rightCol] : 0

        if (r > 0 && Math.random() < 0.35) rightHeat = Math.max(rightHeat, heat[r - 1][c])
        if (r < ROWS - 1 && Math.random() < 0.35) rightHeat = Math.max(rightHeat, heat[r + 1][c])

        if (rightHeat > 0) {
          const distDecay = (1.0 - p) * 0.50
          const decayChance = 0.25 + distDecay + (swing * 0.03)
          const decay = Math.random() < decayChance ? 1 : 0
          heat[r][c] = Math.max(0, rightHeat - decay)
        } else {
          heat[r][c] = 0
        }

        if (r <= 1 && p < 0.75 && heat[r][c] > 0) {
          if (Math.random() < 0.45) heat[r][c] = Math.max(0, heat[r][c] - 1)
        }

        if (p < 0.35 && heat[r][c] > 0) {
          if (Math.random() < 0.5) heat[r][c] = Math.max(0, heat[r][c] - 1)
        }
      }
    }
  }

  function render() {
    let idx = 0
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = cells[idx]
        const level = heat[r][c]
        cell.style.backgroundColor = palette[level]
        cell.classList.remove('glow-3', 'glow-4')
        if (level === 3) cell.classList.add('glow-3')
        if (level === 4) cell.classList.add('glow-4')
        idx++
      }
    }
  }

  update()
  render()
  setInterval(() => { update(); render() }, 200)
}

document.querySelectorAll('.session-item[data-ai="true"] .item-grid').forEach((container) => {
  const item = container.closest('.session-item')
  if (!item) return
  const type = item.dataset.aiType || 'opencode'
  setupFlameGrid(container, type)
})
</script>
</body>
