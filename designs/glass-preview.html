<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patty v2 — 暗色 & 亮色 预览</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ===== Theme Variables ===== */
  :root {
    --accent: #6366f1;
    --accent-alpha: rgba(99, 102, 241, 0.12);
    --accent-glow: rgba(99, 102, 241, 0.3);
    --cyan: #22d3ee;
    --green: #34d399;
    --red: #f87171;
    --amber: #fbbf24;

    --glass-surface-bg: rgba(18, 18, 22, 0.5);
    --glass-surface-border: rgba(255,255,255,0.05);
    --glass-surface-shadow: none;

    --glass-card-bg: rgba(22, 22, 28, 0.6);
    --glass-card-border: rgba(255,255,255,0.06);
    --glass-card-shadow: 0 2px 8px rgba(0,0,0,0.3);

    --glass-dialog-bg: rgba(28, 28, 34, 0.78);
    --glass-dialog-border: rgba(255,255,255,0.08);
    --glass-dialog-shadow: 0 8px 40px rgba(0,0,0,0.5);

    --text-primary: #e6e6ed;
    --text-secondary: #90909e;
    --text-muted: #5c5c6a;
    --font-ui: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Cascadia Code', Consolas, monospace;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --transition-fast: 150ms var(--ease-out);
    --transition-normal: 200ms var(--ease-out);
    --transition-slow: 300ms var(--ease-out);
  }

  body.light {
    --accent: #6366f1;
    --accent-alpha: rgba(99, 102, 241, 0.08);
    --accent-glow: rgba(99, 102, 241, 0.15);

    --glass-surface-bg: rgba(248, 249, 252, 0.55);
    --glass-surface-border: rgba(0,0,0,0.04);
    --glass-surface-shadow: none;

    --glass-card-bg: rgba(242, 243, 247, 0.6);
    --glass-card-border: rgba(0,0,0,0.05);
    --glass-card-shadow: 0 2px 8px rgba(0,0,0,0.04);

    --glass-dialog-bg: rgba(238, 239, 244, 0.78);
    --glass-dialog-border: rgba(0,0,0,0.07);
    --glass-dialog-shadow: 0 8px 40px rgba(0,0,0,0.08);

    --text-primary: #12121a;
    --text-secondary: #5a5a6e;
    --text-muted: #9292a8;
  }

  /* ===== Toggle ===== */
  .toggle-bar {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--glass-dialog-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 5px 14px 5px 10px;
    border-radius: 20px;
    border: 1px solid var(--glass-dialog-border);
    box-shadow: var(--glass-dialog-shadow);
    transition: all var(--transition-normal);
  }
  .toggle-label {
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 12px;
    transition: all var(--transition-fast);
  }
  .toggle-label.active {
    background: var(--accent-alpha);
    color: var(--accent);
  }
  .toggle-label:not(.active):hover {
    background: rgba(128,128,128,0.08);
  }
  .toggle-sep {
    width: 1px;
    height: 14px;
    background: rgba(128,128,128,0.15);
  }

  body {
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: var(--font-ui);
    font-size: 13px;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--transition-slow);
  }
  body.dark { background: #0a0a0c; }
  body.light { background: #f6f7f9; }

  /* Background glow layers */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    transition: opacity var(--transition-slow);
    pointer-events: none;
    z-index: 0;
  }
  body.dark::before {
    opacity: 1;
    background:
      radial-gradient(ellipse 60% 45% at 15% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse 45% 55% at 85% 80%, rgba(34, 211, 238, 0.03) 0%, transparent 50%);
  }
  body.light::before {
    opacity: 1;
    background:
      radial-gradient(ellipse 60% 45% at 15% 20%, rgba(99, 102, 241, 0.04) 0%, transparent 60%),
      radial-gradient(ellipse 45% 55% at 85% 80%, rgba(34, 211, 238, 0.02) 0%, transparent 50%);
  }

  /* ===== Mockup Container ===== */
  .mockup {
    width: 840px;
    height: 560px;
    display: flex;
    flex-direction: column;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    transition: box-shadow var(--transition-slow);
  }
  body.dark .mockup {
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.05),
      0 4px 24px rgba(0,0,0,0.5),
      0 20px 48px rgba(0,0,0,0.3);
  }
  body.light .mockup {
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.05),
      0 4px 24px rgba(0,0,0,0.06),
      0 20px 48px rgba(0,0,0,0.03);
  }

  /* ===== Title Bar (glass-surface) ===== */
  .titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 32px;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
    transition: all var(--transition-normal);
    background: var(--glass-surface-bg);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--glass-surface-border);
  }
  .titlebar::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    transition: opacity var(--transition-normal);
  }
  body.dark .titlebar::after {
    background: linear-gradient(90deg, transparent 5%, rgba(99, 102, 241, 0.15) 30%, rgba(34, 211, 238, 0.08) 60%, transparent 95%);
    opacity: 1;
  }
  body.light .titlebar::after {
    background: linear-gradient(90deg, transparent 5%, rgba(99, 102, 241, 0.08) 30%, rgba(34, 211, 238, 0.04) 60%, transparent 95%);
    opacity: 1;
  }

  .titlebar-drag {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-left: 12px;
    flex: 1;
  }
  .titlebar-brand {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .titlebar-brand-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    transition: all var(--transition-normal);
  }
  body.dark .titlebar-brand-dot {
    background: linear-gradient(135deg, #6366f1, #22d3ee);
    box-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
  }
  body.light .titlebar-brand-dot {
    background: linear-gradient(135deg, #6366f1, #22d3ee);
    box-shadow: 0 0 8px rgba(99, 102, 241, 0.2);
  }
  .titlebar-title {
    font-family: var(--font-ui);
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: color var(--transition-normal);
  }
  body.dark .titlebar-title { color: var(--text-secondary); }
  body.light .titlebar-title { color: var(--text-secondary); }
  .titlebar-controls { display: flex; height: 100%; }
  .titlebar-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 46px;
    height: 100%;
    transition: all var(--transition-fast);
    cursor: pointer;
    color: var(--text-muted);
  }
  .titlebar-btn:hover { background: rgba(128,128,128,0.08); color: var(--text-primary); }
  .titlebar-btn.close:hover { background: #e81123 !important; color: #fff !important; }
  .titlebar-btn svg { display: block; }

  /* ===== Main ===== */
  .main {
    display: flex;
    flex: 1;
    min-height: 0;
    position: relative;
  }

  /* ===== Sidebar (glass-surface) ===== */
  .sidebar {
    width: 220px;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: relative;
    transition: all var(--transition-normal);
    background: var(--glass-surface-bg);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-right: 1px solid var(--glass-surface-border);
  }

  .sidebar-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px;
    border-bottom: 1px solid var(--glass-surface-border);
  }

  .sidebar-search {
    flex: 1;
    height: 28px;
    padding: 0 8px;
    border-radius: var(--radius-sm);
    font-family: var(--font-ui);
    font-size: 12px;
    outline: none;
    transition: all var(--transition-fast);
    background: rgba(128,128,128,0.06);
    border: 1px solid transparent;
    color: var(--text-primary);
  }
  body.light .sidebar-search {
    background: rgba(0,0,0,0.04);
  }
  .sidebar-search::placeholder { color: var(--text-muted); }
  .sidebar-search:focus {
    background: rgba(99, 102, 241, 0.06);
    border-color: var(--accent);
    box-shadow: inset 0 0 0 1px var(--accent);
  }

  .sidebar-add-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: var(--radius-sm);
    font-family: var(--font-ui);
    font-size: 15px;
    font-weight: 500;
    transition: all var(--transition-fast);
    cursor: pointer;
    color: var(--text-muted);
    background: rgba(128,128,128,0.05);
    border: 1px solid transparent;
  }
  .sidebar-add-btn:hover {
    color: var(--accent);
    background: var(--accent-alpha);
    border-color: rgba(99, 102, 241, 0.15);
  }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px;
  }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-thumb {
    background: rgba(128,128,128,0.1);
    border-radius: 2px;
    transition: background var(--transition-fast);
  }
  .sidebar-list::-webkit-scrollbar-thumb:hover {
    background: var(--accent);
  }

  /* ===== Collection ===== */
  .collection { display: flex; flex-direction: column; }
  .collection-header {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 28px;
    padding: 0 6px;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all var(--transition-fast);
    margin: 1px 0;
  }
  .collection-header:hover { background: rgba(128,128,128,0.05); }
  .collection-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    color: var(--text-muted);
    transition: transform var(--transition-fast);
  }
  .collection-arrow svg { display: block; }
  .collection-arrow.open { transform: rotate(90deg); }

  .collection-folder {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    color: var(--text-muted);
  }
  .collection-folder svg { display: block; }
  .collection-name {
    flex: 1;
    font-family: var(--font-ui);
    font-size: 11.5px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.2px;
    color: var(--text-secondary);
    transition: color var(--transition-fast);
  }
  .collection-header:hover .collection-name { color: var(--text-primary); }
  .collection-count {
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 500;
    border-radius: 4px;
    padding: 1px 5px;
    color: var(--text-muted);
    background: rgba(128,128,128,0.06);
    transition: all var(--transition-fast);
  }
  .collection-children { display: flex; flex-direction: column; }

  /* ===== Session Item ===== */
  .session-item {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 28px;
    padding: 0 8px;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all var(--transition-fast);
    position: relative;
  }
  .session-item:hover { background: rgba(128,128,128,0.06); }
  .session-item.active {
    background: var(--accent-alpha);
  }
  .session-item.active::before {
    content: '';
    position: absolute;
    left: -4px;
    top: 4px;
    bottom: 4px;
    width: 2.5px;
    border-radius: 0 3px 3px 0;
    transition: all var(--transition-fast);
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
  }
  .session-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: box-shadow var(--transition-fast);
  }
  .session-dot.blue { background: #818cf8; }
  .session-dot.green { background: var(--green); }
  .session-dot.amber { background: var(--amber); }
  .session-item.active .session-dot { box-shadow: 0 0 5px currentColor; }
  .session-title {
    flex: 1;
    font-family: var(--font-ui);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-secondary);
    transition: color var(--transition-fast);
  }
  .session-item:hover .session-title { color: var(--text-primary); }
  .session-item.active .session-title {
    color: var(--text-primary);
    font-weight: 500;
  }
  .session-close {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 4px;
    opacity: 0;
    transition: all var(--transition-fast);
    cursor: pointer;
    color: var(--text-muted);
  }
  .session-item:hover .session-close { opacity: 1; }
  .session-close:hover { background: rgba(232, 17, 35, 0.15); color: var(--red) !important; }

  /* Attention states */
  body.dark .attention-request { background: rgba(99, 102, 241, 0.12) !important; }
  body.light .attention-request { background: rgba(99, 102, 241, 0.08) !important; }
  body.dark .attention-done { background: rgba(52, 211, 153, 0.12) !important; }
  body.light .attention-done { background: rgba(52, 211, 153, 0.08) !important; }
  body.dark .attention-error { background: rgba(248, 113, 113, 0.12) !important; }
  body.light .attention-error { background: rgba(248, 113, 113, 0.08) !important; }
  .attention-request::before,
  .attention-done::before,
  .attention-error::before {
    content: '';
    position: absolute;
    left: -4px;
    top: 4px;
    bottom: 4px;
    width: 2.5px;
    border-radius: 0 3px 3px 0;
  }
  .attention-request::before { background: #818cf8; box-shadow: 0 0 6px rgba(99, 102, 241, 0.3); }
  .attention-done::before { background: var(--green); box-shadow: 0 0 6px rgba(52, 211, 153, 0.3); }
  .attention-error::before { background: var(--red); box-shadow: 0 0 6px rgba(248, 113, 113, 0.3); }
  .attention-request, .attention-done, .attention-error { animation: breathe 2s var(--ease-out) infinite; }
  @keyframes breathe {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* ===== Content Area ===== */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    position: relative;
    transition: all var(--transition-normal);
    background: rgba(128,128,128,0.02);
  }
  body.light .content {
    background: rgba(255,255,255,0.3);
  }

  .terminal-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin: 8px;
    border-radius: var(--radius-md);
    overflow: hidden;
    transition: all var(--transition-normal);
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(128,128,128,0.06);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
  }
  body.light .terminal-area {
    background: rgba(255,255,255,0.5);
    border-color: rgba(0,0,0,0.04);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
  }
  .terminal-area::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius-md);
    transition: opacity var(--transition-fast);
    pointer-events: none;
    opacity: 0;
  }
  .terminal-area:hover::after {
    opacity: 1;
    box-shadow: inset 0 0 0 1px var(--accent-alpha);
  }

  .terminal-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    transition: opacity var(--transition-normal);
    opacity: 0.35;
  }
  .terminal-empty-icon svg { display: block; }
  .terminal-empty-title {
    font-family: var(--font-ui);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.2px;
    color: var(--text-secondary);
  }
  .terminal-empty-desc {
    font-family: var(--font-ui);
    font-size: 12.5px;
    color: var(--text-muted);
  }
  kbd {
    display: inline-block;
    padding: 0 5px;
    height: 20px;
    line-height: 20px;
    font-family: var(--font-mono);
    font-size: 11px;
    border-radius: 4px;
    background: rgba(128,128,128,0.08);
    border: 1px solid rgba(128,128,128,0.12);
    border-bottom-width: 2px;
    color: var(--text-secondary);
  }

  /* ===== Status Bar (glass-surface) ===== */
  .statusbar {
    display: flex;
    align-items: center;
    height: 24px;
    padding: 0 10px;
    gap: 6px;
    flex-shrink: 0;
    position: relative;
    transition: all var(--transition-normal);
    background: var(--glass-surface-bg);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-top: 1px solid var(--glass-surface-border);
  }
  .statusbar::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(128,128,128,0.04), transparent);
  }
  .status-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
    color: var(--text-muted);
    transition: color var(--transition-fast);
  }
  .status-item:hover { color: var(--text-secondary); }
  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 5px rgba(52, 211, 153, 0.3);
  }
  .status-sep {
    font-size: 10px;
    font-weight: 400;
    color: rgba(128,128,128,0.2);
  }
  .status-spacer { flex: 1; }
  .status-right { display: flex; align-items: center; gap: 6px; }
  .status-pid {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    opacity: 0.6;
  }

  /* ===== Resize Handle ===== */
  .resize-handle {
    position: absolute;
    top: 0;
    right: -2px;
    width: 4px;
    height: 100%;
    cursor: col-resize;
    z-index: 5;
    transition: all var(--transition-fast);
    border-radius: 0 2px 2px 0;
  }
  .resize-handle::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 2px;
    height: 24px;
    border-radius: 2px;
    background: rgba(128,128,128,0.06);
    transition: all var(--transition-fast);
  }
  .resize-handle:hover::after,
  .resize-handle:active::after {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
    height: 40px;
  }
</style>
</head>
<body class="dark">

<!-- Toggle -->
<div class="toggle-bar" id="toggleBar">
  <span class="toggle-label active" data-theme="dark" onclick="switchTheme('dark')">Dark</span>
  <div class="toggle-sep"></div>
  <span class="toggle-label" data-theme="light" onclick="switchTheme('light')">Light</span>
</div>

<div class="mockup">
  <!-- Title Bar -->
  <div class="titlebar">
    <div class="titlebar-drag">
      <div class="titlebar-brand">
        <div class="titlebar-brand-dot"></div>
        <span class="titlebar-title">Patty</span>
      </div>
    </div>
    <div class="titlebar-controls">
      <div class="titlebar-btn">
        <svg width="12" height="12" viewBox="0 0 12 12">
          <rect x="1" y="2" width="7" height="1.2" rx="0.6" fill="currentColor"/>
          <rect x="1" y="5.4" width="7" height="1.2" rx="0.6" fill="currentColor"/>
          <rect x="1" y="8.8" width="7" height="1.2" rx="0.6" fill="currentColor"/>
          <circle cx="9.5" cy="2.6" r="1.4" fill="currentColor"/>
          <circle cx="9.5" cy="6" r="1.4" fill="currentColor"/>
          <circle cx="9.5" cy="9.4" r="1.4" fill="currentColor"/>
        </svg>
      </div>
      <div class="titlebar-btn">
        <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg>
      </div>
      <div class="titlebar-btn">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" stroke="currentColor" fill="none" stroke-width="1"/></svg>
      </div>
      <div class="titlebar-btn close">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M0.5 0.5L9.5 9.5M9.5 0.5L0.5 9.5" stroke="currentColor" stroke-width="1"/></svg>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
