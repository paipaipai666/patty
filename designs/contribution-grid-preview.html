<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patty AI 条目 — 火焰贡献图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #6366f1;
    --accent-alpha: rgba(99, 102, 241, 0.12);
    --accent-glow: rgba(99, 102, 241, 0.3);
    --cyan: #22d3ee;
    --green: #34d399;
    --red: #f87171;
    --amber: #fbbf24;
    --bg-app: #08080a;
    --glass-bg: rgba(16, 16, 20, 0.55);
    --text-primary: #e6e6ed;
    --text-secondary: #90909e;
    --text-muted: #5c5c6a;
    --border-subtle: rgba(255,255,255,0.05);
    --font-ui: 'Inter', system-ui, sans-serif;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --transition-fast: 150ms var(--ease-out);
    --item-h: 42px;
    --cell-gap: 1.5px;
  }

  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-app);
    font-family: var(--font-ui);
    font-size: 13px;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 40% at 12% 18%, rgba(99, 102, 241, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 88% 82%, rgba(34, 211, 238, 0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .mockup {
    display: flex;
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 4px 24px rgba(0,0,0,0.5), 0 20px 48px rgba(0,0,0,0.3);
    position: relative;
    z-index: 1;
    height: 480px;
  }

  .sidebar {
    width: 240px;
    display: flex;
    flex-direction: column;
    background: var(--glass-bg);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    position: relative;
  }

  .sidebar-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .sidebar-search {
    flex: 1;
    height: 28px;
    padding: 0 8px;
    border-radius: var(--radius-sm);
    font-family: var(--font-ui);
    font-size: 12px;
    outline: none;
    background: rgba(128,128,128,0.06);
    border: 1px solid transparent;
    color: var(--text-primary);
  }
  .sidebar-search::placeholder { color: var(--text-muted); }
  .sidebar-search:focus {
    background: var(--accent-alpha);
    border-color: rgba(99, 102, 241, 0.3);
    box-shadow: inset 0 0 0 1px rgba(99, 102, 241, 0.2), 0 0 12px rgba(99, 102, 241, 0.06);
  }

  .sidebar-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px; height: 28px;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    background: rgba(128,128,128,0.05);
    border: 1px solid transparent;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition-fast);
  }
  .sidebar-btn:hover {
    color: var(--accent);
    background: var(--accent-alpha);
    border-color: rgba(99, 102, 241, 0.15);
    transform: scale(1.04);
    box-shadow: 0 0 16px rgba(99, 102, 241, 0.08);
  }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px;
  }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.1); border-radius: 2px; }

  .collection-header {
    display: flex;
    align-items: center;
    gap: 6px;
    height: var(--item-h);
    padding: 0 6px;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: background var(--transition-fast);
  }
  .collection-header:hover { background: rgba(128,128,128,0.05); }
  .collection-arrow { display: flex; align-items: center; justify-content: center; width: 14px; height: 14px; flex-shrink: 0; color: var(--text-muted); }
  .collection-folder { color: var(--text-muted); flex-shrink: 0; }
  .collection-name {
    flex: 1; font-size: 11.5px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: 0.2px; color: var(--text-secondary);
    transition: color var(--transition-fast);
  }
  .collection-header:hover .collection-name { color: var(--text-primary); }
  .collection-count {
    font-size: 10px; font-weight: 500; border-radius: 4px;
    padding: 1px 5px; color: var(--text-muted);
    background: rgba(128,128,128,0.06);
  }
  .collection-children { display: flex; flex-direction: column; }

  /* ===== Session Item ===== */
  .session-item {
    display: flex;
    align-items: center;
    gap: 6px;
    height: var(--item-h);
    padding: 0 8px 0 8px;
    cursor: pointer;
    border-radius: var(--radius-sm);
    position: relative;
    overflow: hidden;
    transition: all var(--transition-fast);
    will-change: transform, background;
  }
  .session-item:hover { transform: translateX(1px); }
  .session-item:active { transform: scale(0.98); }
  .session-item.active { background: var(--accent-alpha); }
  .session-item.active::before {
    content: '';
    position: absolute;
    left: -4px; top: 4px; bottom: 4px;
    width: 2.5px; border-radius: 0 3px 3px 0;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
  }

  .item-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.60;
    transition: opacity var(--transition-fast);
  }
  .session-item:hover .item-grid { opacity: 0.90; }

  .item-grid {
    display: grid;
    gap: 3.5px;
    align-content: center;
    justify-content: start;
    padding: 3px 6px;
  }

  .item-grid .gc {
    border-radius: 2px;
    transition: background-color 240ms cubic-bezier(0.16,1,0.3,1), box-shadow 240ms cubic-bezier(0.16,1,0.3,1);
  }
  .item-grid[data-type="claude"] .gc.glow-3 { box-shadow: 0 0 4px rgba(204,120,92,0.25); }
  .item-grid[data-type="claude"] .gc.glow-4 { box-shadow: 0 0 8px rgba(204,120,92,0.5); }
  .item-grid[data-type="opencode"] .gc.glow-3 { box-shadow: 0 0 4px rgba(255,255,255,0.25); }
  .item-grid[data-type="opencode"] .gc.glow-4 { box-shadow: 0 0 8px rgba(255,255,255,0.5); }

  /* Flame glow overlay — visible on hover */
  .item-grid::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 60%;
    pointer-events: none;
    opacity: 0;
    transition: opacity var(--transition-fast);
  }
  .session-item:hover .item-grid::after { opacity: 1; }
  .item-grid[data-type="claude"]::after {
    background: linear-gradient(90deg, transparent 0%, rgba(204,120,92,0.10) 40%, rgba(204,120,92,0.22) 100%);
  }
  .item-grid[data-type="opencode"]::after {
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 40%, rgba(255,255,255,0.18) 100%);
  }

  .session-item > *:not(.item-grid) { position: relative; z-index: 1; }

  .session-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    transition: box-shadow var(--transition-fast);
  }
  .session-dot.blue { background: #818cf8; }
  .session-dot.green { background: var(--green); }
  .session-dot.amber { background: var(--amber); }
  .session-dot.purple { background: #a78bfa; }
  .session-dot.coral { background: #f87171; }
  .session-item.active .session-dot { box-shadow: 0 0 5px var(--accent-glow); }

  .session-title {
    flex: 1; font-size: 12px; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: color var(--transition-fast);
  }
  .session-item:hover .session-title { color: var(--text-primary); }
  .session-item.active .session-title { color: var(--text-primary); font-weight: 500; }

  .session-close {
    display: flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 4px;
    opacity: 0; transition: all var(--transition-fast);
    cursor: pointer; color: var(--text-muted);
  }
  .session-item:hover .session-close { opacity: 1; }
  .session-close:hover { background: rgba(232, 17, 35, 0.15); color: var(--red) !important; }

  .ai-badge {
    display: flex; align-items: center; justify-content: center;
    width: 14px; height: 14px; border-radius: 3px;
    background: rgba(99, 102, 241, 0.08);
    color: var(--accent);
  }
  .ai-badge svg { display: block; }

  .item-spacer { width: 4px; flex-shrink: 0; }

  /* ===== Content Area ===== */
  .content {
    width: 340px; display: flex; flex-direction: column;
    background: rgba(128,128,128,0.02);
    border-left: 1px solid var(--border-subtle);
  }
  .terminal-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    margin: 8px; border-radius: var(--radius-md);
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(128,128,128,0.06);
  }
  .terminal-empty { text-align: center; opacity: 0.35; }
  .terminal-empty-title { font-size: 18px; font-weight: 600; letter-spacing: -0.2px; color: var(--text-secondary); margin-bottom: 6px; }
  .terminal-empty-desc { font-size: 12.5px; color: var(--text-muted); }

  .statusbar {
    display: flex; align-items: center; height: 24px; padding: 0 10px; gap: 6px;
    background: var(--glass-bg); backdrop-filter: blur(8px);
    border-top: 1px solid var(--border-subtle); font-size: 11px; flex-shrink: 0;
  }
  .status-item { color: var(--text-muted); font-weight: 500; }
  .status-sep { color: rgba(128,128,128,0.2); font-size: 10px; }
</style>

<script>
// ================================================================
// Uniform-flow flame simulation (adapted from gemini-code version)
// Key fixes over fire.html:
//   1. All rows equal at right core (no built-in slope)
//   2. Enhanced vertical stickiness (35% all rows) → no jagged edges
//   3. Distance-based decay only (no row-height decay) → no staircase
//   4. Pure random top sparseness → natural fragmented flame tip
//   5. Simple left erasing → clean flame front
// ================================================================

const ROWS = 5
const GAP = 3.5
const PAD = 6

const PALETTES = {
  claude: [
    'transparent',
    'rgba(204,120,92,0.08)',
    'rgba(204,120,92,0.30)',
    'rgba(204,120,92,0.65)',
    'rgba(204,120,92,1.0)',
  ],
  opencode: [
    'transparent',
    'rgba(255,255,255,0.06)',
    'rgba(255,255,255,0.25)',
    'rgba(255,255,255,0.55)',
    'rgba(255,255,255,0.95)',
  ],
}

function setupFlameGrid(container, type) {
  const parent = container.parentElement
  const parentW = parent.offsetWidth || 240
  const parentH = parent.offsetHeight || 42
  const cellSize = Math.floor((parentH - PAD * 2 - (ROWS - 1) * GAP) / ROWS)
  const usableW = parentW - PAD * 2 - 20
  const COLS = Math.max(16, Math.floor((usableW + GAP) / (cellSize + GAP)))
  const palette = PALETTES[type] || PALETTES.opencode

  container.dataset.type = type
  container.style.gridTemplateColumns = `repeat(${COLS}, ${cellSize}px)`
  container.style.gridTemplateRows = `repeat(${ROWS}, ${cellSize}px)`

  const cells = []
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const div = document.createElement('div')
      div.className = 'gc'
      cells.push(div)
      container.appendChild(div)
    }
  }

  const heat = Array.from({ length: ROWS }, () => new Array(COLS).fill(0))
  let tick = 0

  function update() {
    tick++
    const swing = Math.sin(tick * 0.25) * 1.5

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = c / COLS

        // 修复1: 统一右侧火源，所有行平权
        if (p > 0.92) {
          heat[r][c] = Math.random() < 0.15 ? 3 : 4
          continue
        }

        const rightCol = c + 1
        let rightHeat = rightCol < COLS ? heat[r][rightCol] : 0

        // 修复2: 增强纵向粘滞，35% 所有行 — 消除锯齿断层
        if (r > 0 && Math.random() < 0.35) rightHeat = Math.max(rightHeat, heat[r - 1][c])
        if (r < ROWS - 1 && Math.random() < 0.35) rightHeat = Math.max(rightHeat, heat[r + 1][c])

        if (rightHeat > 0) {
          // 修复3: 仅横向距离衰减，无行高坡度
          const distDecay = (1.0 - p) * 0.50
          const decayChance = 0.25 + distDecay + (swing * 0.03)
          const decay = Math.random() < decayChance ? 1 : 0
          heat[r][c] = Math.max(0, rightHeat - decay)
        } else {
          heat[r][c] = 0
        }

        // 修复4: 纯随机顶部稀疏 — 自然破碎感
        if (r <= 1 && p < 0.75 && heat[r][c] > 0) {
          if (Math.random() < 0.45) heat[r][c] = Math.max(0, heat[r][c] - 1)
        }

        // 修复5: 左侧尖端湮灭
        if (p < 0.35 && heat[r][c] > 0) {
          if (Math.random() < 0.5) heat[r][c] = Math.max(0, heat[r][c] - 1)
        }
      }
    }
  }

  function render() {
    let idx = 0
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = cells[idx]
        const level = heat[r][c]
        cell.style.backgroundColor = palette[level]
        cell.classList.remove('glow-3', 'glow-4')
        if (level === 3) cell.classList.add('glow-3')
        if (level === 4) cell.classList.add('glow-4')
        idx++
      }
    }
  }

  update()
  render()
  setInterval(() => { update(); render() }, 200)
}

document.querySelectorAll('.session-item[data-ai="true"]').forEach((item) => {
  const container = item.querySelector('.item-grid')
  if (!container) return
  const type = item.dataset.aiType || 'claude'
  setupFlameGrid(container, type)
})
</script>
