<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7行 GitHub 风格粒子缓燃组件 - 稀疏高耸版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #08080a;
    font-family: 'Inter', system-ui, sans-serif;
    user-select: none;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 55% 50%, rgba(239, 68, 68, 0.05) 0%, transparent 50%);
    pointer-events: none;
  }
  .preview-container {
    background: rgba(16, 16, 20, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding: 30px;
    border-radius: 14px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  .title {
    color: #e6e6ed;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .title::before {
    content: '';
    width: 6px;
    height: 6px;
    background: #ef4444;
    border-radius: 50%;
    box-shadow: 0 0 8px #ef4444;
  }
  .flame-grid {
    display: grid;
    gap: 3.5px; /* 稍微拉开一点粒子间距，让顶部稀疏时更有网格呼吸感 */
    background: rgba(0, 0, 0, 0.3);
    padding: 16px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.02);
  }
  .flame-grid .gc {
    border-radius: 2px;
    /* 让顶部火星的熄灭和闪烁有一种从亮变暗的柔和过渡 */
    transition: background-color 240ms cubic-bezier(0.16, 1, 0.3, 1), 
                box-shadow 240ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .flame-grid .gc.glow-3 { box-shadow: 0 0 4px rgba(249, 115, 22, 0.25); }
  .flame-grid .gc.glow-4 { box-shadow: 0 0 8px rgba(239, 68, 68, 0.5); }
</style>
</head>
<body>

<div class="preview-container">
  <div class="title">缓缓燃烧的火焰 (顶部高耸稀疏优化)</div>
  <div id="flameGrid" class="flame-grid"></div>
</div>

<script>
const ROWS = 7;      
const COLS = 45;     
const CELL_SIZE = 14; // 稍微放大了粒子尺寸，结合间距拉高整体视觉上的火焰高度

const FLAME_PALETTE = [
  'rgba(255, 255, 255, 0.02)', // 0: 空白底槽
  'rgba(185, 28, 28, 0.20)',   // 1: 暗红烟梢
  'rgba(220, 38, 38, 0.55)',   // 2: 猩红外焰
  'rgba(249, 115, 22, 0.85)',  // 3: 亮橙内焰
  'rgba(254, 240, 138, 1.0)'   // 4: 明黄火源核心
];

const container = document.getElementById('flameGrid');
container.style.gridTemplateColumns = `repeat(${COLS}, ${CELL_SIZE}px)`;
container.style.gridTemplateRows = `repeat(${ROWS}, ${CELL_SIZE}px)`;

let heatMatrix = Array.from({ length: ROWS }, () => new Array(COLS).fill(0));
const cellElements = [];

// 构建网格
for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    const cell = document.createElement('div');
    cell.className = 'gc';
    cell.style.width = `${CELL_SIZE}px`;
    cell.style.height = `${CELL_SIZE}px`;
    container.appendChild(cell);
    cellElements.push(cell);
  }
}

let tick = 0;
function updateFlame() {
  tick++;
  // 风向正弦波驱动左右摇曳
  const swing = Math.sin(tick * 0.22) * 1.5; 

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const p = c / COLS; 

      // 1. 最右侧强力火源（主根基在第2-4行，保持火焰中部和下部稳定饱满）
      if (p > 0.92) {
        heatMatrix[r][c] = (r >= 2 && r <= 4) ? (Math.random() < 0.1 ? 3 : 4) : 2;
        continue;
      }

      // 2. 热量向左传递
      const rightCol = c + 1;
      let rightHeat = rightCol < COLS ? heatMatrix[r][rightCol] : 0;

      // 动态垂直热流：顶行（0-1行）减少纵向粘滞，形成断裂散点；底层加强交互保持连贯
      const vertChance = r < 2 ? 0.12 : 0.30;
      if (r > 0 && Math.random() < vertChance) rightHeat = Math.max(rightHeat, heatMatrix[r-1][c]);
      if (r < ROWS - 1 && Math.random() < vertChance) rightHeat = Math.max(rightHeat, heatMatrix[r+1][c]);

      if (rightHeat > 0) {
        // 核心改动：不仅看横向坐标 p，还要看纵向坐标 r。
        // 越靠顶部（r越小），衰减几率剧增，导致顶部的火苗迅速剥落变稀疏
        const rowHeightDecay = (ROWS - r) * 0.08; 
        const distanceDecay = (1.0 - p) * 0.55; 
        
        const decayChance = 0.15 + distanceDecay + rowHeightDecay + (swing * 0.02);
        
        const decay = Math.random() < decayChance ? 1 : 0;
        heatMatrix[r][c] = Math.max(0, rightHeat - decay);
      } else {
        heatMatrix[r][c] = 0;
      }

      // 3. 顶部与左侧的综合湮灭机制（高空热对流冷切）
      if (heatMatrix[r][c] > 0) {
        // 如果是顶部的第 0 或第 1 行，且在中左侧区域，施加极高概率的“乱切随机数”
        if (r <= 1 && p < 0.80) {
          const topEraseChance = 0.45 + (1.0 - p) * 0.5;
          if (Math.random() < topEraseChance) {
            heatMatrix[r][c] = Math.max(0, heatMatrix[r][c] - 1);
          }
        }
        
        // 左侧大范围的基础粒子清洗，确保火舌尖端干净、不堵塞
        if (p < 0.45) {
          const leftEraseChance = 0.35 + (0.45 - p) * 1.2;
          if (Math.random() < leftEraseChance) {
            heatMatrix[r][c] = Math.max(0, heatMatrix[r][c] - 1);
          }
        }
      }
    }
  }
}

function renderFlame() {
  let idx = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = cellElements[idx];
      const level = heatMatrix[r][c];
      
      cell.style.backgroundColor = FLAME_PALETTE[level];
      
      cell.classList.remove('glow-3', 'glow-4');
      if (level === 3) cell.classList.add('glow-3');
      if (level === 4) cell.classList.add('glow-4');
      
      idx++;
    }
  }
}

// 保持高效的动力学更新节奏 (220ms)
setInterval(() => {
  updateFlame();
  renderFlame();
}, 220);

updateFlame();
renderFlame();
</script>

</body>
</html>
