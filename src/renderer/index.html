<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'sha256-swE018xOIYI928RWKL5w+RmVVUJ7mYzsNVkIEBkRKIk='; style-src 'self' 'unsafe-inline'"
    />
    <link rel="icon" type="image/x-icon" href="./public/icon.ico" />
    <!-- Paint the splash/html background in the persisted theme's color before
         first render. The value is written by settingsStore on every load and
         theme change; the CSP hash for this script is in script-src above. -->
    <script>try{var c=localStorage.getItem('patty-boot-bg');if(c){document.documentElement.style.setProperty('--patty-boot-bg',c)}}catch(e){}</script>
    <style>
      html,
      body {
        background: var(--patty-boot-bg, #0a0a0c);
      }

      /* Boot splash: renders from raw HTML before the JS bundle loads, so the
         WebView2 init + bundle parse window shows a branded transition instead
         of an empty window. Removed by App.tsx after first paint. */
      #patty-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: var(--patty-boot-bg, #0a0a0c);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        transition: opacity 150ms ease-out;
      }
      #patty-splash.patty-splash-hide {
        opacity: 0;
        pointer-events: none;
      }
      /* Terminal-prompt mark: frame draws in, chevron + cursor fade up,
         cursor blinks once settled. Accent matches Patty's brand indigo. */
      #patty-splash .frame {
        stroke-dasharray: 170;
        stroke-dashoffset: 170;
        animation: patty-frame 0.7s ease-out 0.05s forwards;
      }
      #patty-splash .prompt,
      #patty-splash .cursor {
        opacity: 0;
        transform: translateY(3px);
        animation: patty-rise 0.3s ease-out 0.45s forwards;
      }
      #patty-splash .cursor {
        animation:
          patty-rise 0.3s ease-out 0.6s forwards,
          patty-blink 1.1s steps(2, jump-none) 0.9s infinite;
      }
      #patty-splash .word {
        color: #8f8f9b;
        font: 600 14px/1 system-ui, sans-serif;
        letter-spacing: 0.42em;
        text-indent: 0.42em;
        text-transform: uppercase;
        opacity: 0;
        animation: patty-fade 0.4s ease-out 0.25s forwards;
      }
      #patty-splash .bar {
        width: 132px;
        height: 2px;
        border-radius: 2px;
        background: rgba(128, 128, 128, 0.25);
        overflow: hidden;
      }
      #patty-splash .bar i {
        display: block;
        width: 34%;
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, transparent, #6366f1, transparent);
        animation: patty-sweep 1.15s ease-in-out 0.3s infinite;
      }
      @keyframes patty-frame {
        to {
          stroke-dashoffset: 0;
        }
      }
      @keyframes patty-rise {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes patty-fade {
        to {
          opacity: 1;
        }
      }
      @keyframes patty-blink {
        50% {
          opacity: 0;
        }
      }
      @keyframes patty-sweep {
        from {
          transform: translateX(-100%);
        }
        to {
          transform: translateX(390%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #patty-splash {
          transition: none;
        }
        #patty-splash .frame {
          stroke-dashoffset: 0;
          animation: none;
        }
        #patty-splash .prompt,
        #patty-splash .cursor,
        #patty-splash .word {
          opacity: 1;
          transform: none;
          animation: none;
        }
        #patty-splash .bar i {
          animation: none;
          transform: translateX(100%);
        }
      }
    </style>
    <title>Patty</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="patty-splash" aria-hidden="true">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
        <rect class="frame" x="3" y="3" width="46" height="46" rx="12" stroke="#6366f1" stroke-width="2.5" />
        <path class="prompt" d="M16 20 L24 26 L16 32" stroke="#6366f1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
        <line class="cursor" x1="28" y1="33" x2="36" y2="33" stroke="#6366f1" stroke-width="3" stroke-linecap="round" />
      </svg>
      <div class="word">Patty</div>
      <div class="bar"><i></i></div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
